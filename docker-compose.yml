services:
  lift:
    image: nginx:alpine
    container_name: lift
    restart: unless-stopped
    ports:
      # Host port 8090 → container port 80. Change left side if 8090 is taken.
      # (8080 is in use by qBittorrent on the NAS.)
      - "8090:80"
    volumes:
      # Absolute path so this works when deployed via Portainer (which doesn't
      # resolve ./public relative to the repo). Repo lives at /volume1/docker/lift
      # on the NAS — clone there and update via `git pull`.
      - /volume1/docker/lift/public:/usr/share/nginx/html:ro
